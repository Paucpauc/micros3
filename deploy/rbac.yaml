apiVersion: v1
kind: ServiceAccount
metadata:
  name: micros3-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: micros3-role
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: micros3-rolebinding
subjects:
  - kind: ServiceAccount
    name: micros3-sa
roleRef:
  kind: Role
  name: micros3-role
  apiGroup: rbac.authorization.k8s.io
