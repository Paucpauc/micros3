{{- if .Values.podMonitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "micros3.fullname" . }}
  labels:
    {{- include "micros3.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "micros3.selectorLabels" . | nindent 6 }}
  podMetricsEndpoints:
    - port: s3
      path: /metrics
      interval: {{ .Values.podMonitor.interval }}
      scrapeTimeout: {{ .Values.podMonitor.scrapeTimeout }}
{{- end }}
